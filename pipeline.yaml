AWSTemplateFormatVersion: '2010-09-09'
Description: 'CodePipeline Cross-Region Deployment Demo (eu-west-1 and us-east-1)'

Parameters:
  GitHubRepositoryId:
    Type: String
    Description: GitHub Repository ID (e.g. org/repo)
    ConstraintDescription: "GitHub Repository ID (e.g. org/repo)"
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection for GitHub App
  ArtifactBucketEU:
    Type: String
    Description: Existing S3 bucket in eu-west-1 for storing pipeline artifacts
  ArtifactBucketUS:
    Type: String
    Description: Existing S3 bucket in us-east-1 for storing pipeline artifacts
  CodeBuildProjectName:
    Type: String
    Default: CrossRegionLambdaBuild
    Description: Name of the CodeBuild Project that runs the buildspec.yml

Resources:
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                Resource: 
                  - !Sub "arn:aws:s3:::${ArtifactBucketEU}/*"
                  - !Sub "arn:aws:s3:::${ArtifactBucketEU}"
                  - !Sub "arn:aws:s3:::${ArtifactBucketUS}/*"
                  - !Sub "arn:aws:s3:::${ArtifactBucketUS}"
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                Resource: '*'
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: '*'

  # Example role for CloudFormation to assume during deployment
  CFNDeployRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess # For demo simplicity

  CrossRegionPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      RoleArn: !GetAtt PipelineRole.Arn
      # ArtifactStores map is REQUIRED for cross-region actions instead of a single ArtifactStore
      ArtifactStores:
        - Region: eu-west-1
          ArtifactStore:
            Type: S3
            Location: !Ref ArtifactBucketEU
        - Region: us-east-1
          ArtifactStore:
            Type: S3
            Location: !Ref ArtifactBucketUS
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              OutputArtifacts:
                - Name: SourceArtifact
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref GitHubRepositoryId
                BranchName: main
              RunOrder: 1
              Region: eu-west-1 # Pipeline native region

        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: OutputEU
                - Name: OutputUS
              Configuration:
                ProjectName: !Ref CodeBuildProjectName
              RunOrder: 1
              Region: eu-west-1

        - Name: Deploy-EU-West-1
          Actions:
            - Name: DeployCloudFormationEU
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: OutputEU
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CFNDeployRole.Arn
                StackName: MyDemoLambdaStackEU
                TemplatePath: OutputEU::packaged-eu-west-1.yaml
              RunOrder: 1
              Region: eu-west-1

        - Name: Deploy-US-East-1
          Actions:
            - Name: DeployCloudFormationUS
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: '1'
              InputArtifacts:
                - Name: OutputUS
              Configuration:
                ActionMode: CREATE_UPDATE
                Capabilities: CAPABILITY_NAMED_IAM
                RoleArn: !GetAtt CFNDeployRole.Arn
                StackName: MyDemoLambdaStackUS
                TemplatePath: OutputUS::packaged-us-east-1.yaml
              RunOrder: 1
              Region: us-east-1 # Cross-region action!
